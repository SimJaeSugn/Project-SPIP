<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--
    CSP (L-1, EM-M-1): default-src 'none' 기준으로 강화. 인라인/외부 스크립트 금지.
    Electron 전환 후 자산 출처는 app:// 커스텀 프로토콜('self'). 네트워크 fetch 없음(connect-src 'none').
    main 이 session.webRequest.onHeadersReceived 로 동일 CSP 를 응답 헤더로도 이중 주입한다(EM-M-1).
    여기 메타는 그 정합 사본(축약 금지 — 누락은 약화).
    인라인 스크립트 0 · 인라인 이벤트 핸들러 0 · 자산은 동일 출처('self')만.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
  <title>Project-SPIP — 로컬 프로젝트 대시보드</title>
  <!-- 자산은 app:// 프로토콜 루트(public/) 기준 상대경로. staticHandler /static 매핑 제거(EM-M-1). -->
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a class="skip-link" href="#main">본문으로 건너뛰기</a>

  <!-- 앱 루트: 모든 뷰(로딩/대시보드/firstRun/스캐닝/설정/드로어)는 app.js가 DOM API로 렌더(L-1) -->
  <div id="app" class="app-root"></div>

  <!-- 액션 피드백 토스트 -->
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="./app.js" defer></script>
</body>
</html>

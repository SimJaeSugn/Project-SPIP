# electron-builder 설정 (electron-migration §7.2, PM 확정 Q5/Q6)
appId: com.spip.app
productName: Project-SPIP

# 패킹 파일 — test/·docs/ 제외(§7.2). asar 기본 활성.
files:
  - electron/**/*
  - lib/**/*
  - public/**/*
  - package.json
  - "!test/**/*"
  - "!docs/**/*"
asar: true

# 쓰기 데이터는 설치 디렉터리가 아닌 %APPDATA%\spip(paths.appDir)에만(EM-M-3).
# 설치 디렉터리는 읽기 전용.
directories:
  buildResources: build
  output: dist

# 트레이 전용 아이콘(icon-tray.ico)을 resources/ 에 언팩 동봉(런타임 nativeImage 로드용).
#   files 화이트리스트에는 build/ 가 없어 asar 에 안 들어가므로, 트레이가 읽을 실파일을 별도 동봉한다.
#   main.js 는 app.isPackaged 시 process.resourcesPath/icon-tray.ico 로 해석한다.
#   filter glob 이라 build/icon-tray.ico 가 아직 없어도 빌드는 실패하지 않는다(부재 시 빈 아이콘 폴백).
extraResources:
  - from: build
    to: .
    filter:
      - icon-tray.ico

# fuses 적용(EM-M-3): RunAsNode off·OnlyLoadAppFromAsar·asar integrity 등.
afterPack: build/afterPack.js

win:
  target:
    - nsis
    - portable
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

portable:
  artifactName: ${productName}-${version}-portable.${ext}

# 코드 서명: 미서명 배포(위험 수용, PM 확정 Q5). SmartScreen 경고 안내는 설치 문서로.

# ★ 자동 업데이트 게시 위치(GitHub Releases). electron-builder 가 릴리즈에 인스톨러와 함께
#   latest.yml·*.blockmap 을 올리고 app-update.yml 을 패키지에 번들 → electron-updater 가
#   설치본에서 latest.yml 을 보고 새 버전을 감지한다(클라이언트: electron/autoUpdate.js, 사용자 주도).
publish:
  - provider: github
    owner: SimJaeSugn
    repo: Project-SPIP
    releaseType: release
